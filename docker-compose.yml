x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-airflow}:${POSTGRES_PASSWORD:-airflow}@postgres/${POSTGRES_DB:-airflow}
    AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "False"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "True"
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-}
    PIPELINE_DB_HOST: postgres
    PIPELINE_DB_NAME: ${POSTGRES_DB:-airflow}
    PIPELINE_DB_USER: ${POSTGRES_USER:-airflow}
    PIPELINE_DB_PASSWORD: ${POSTGRES_PASSWORD:-airflow}
    PIPELINE_DB_PORT: "5432"
    SHIPMENT_API_URL: http://api:8000
    CUSTOMER_TIERS_CSV: /opt/airflow/data/customer_tiers.csv
  volumes:
    - ./dags:/opt/airflow/dags
    - ./scripts:/opt/airflow/scripts
    - ./sql:/opt/airflow/sql
    - ./data:/opt/airflow/data
    - ./tests:/opt/airflow/tests
    - ./logs:/opt/airflow/logs

services:
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-airflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-airflow}
      POSTGRES_DB: ${POSTGRES_DB:-airflow}
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5
    restart: always

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  airflow-webserver:
    <<: *airflow-common
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    ports:
      - "8080:8080"
    command: >
      bash -c "airflow db init &&
               airflow db upgrade &&
               airflow users create
                 --username admin
                 --password ${AIRFLOW_ADMIN_PASSWORD:-admin}
                 --firstname Admin
                 --lastname User
                 --role Admin
                 --email admin@example.com || true &&
               airflow webserver"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  airflow-scheduler:
    <<: *airflow-common
    depends_on:
      airflow-webserver:
        condition: service_healthy
    command: airflow scheduler
    restart: always

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PIPELINE_DB_HOST: postgres
      PIPELINE_DB_NAME: ${POSTGRES_DB:-airflow}
      PIPELINE_DB_USER: ${POSTGRES_USER:-airflow}
      PIPELINE_DB_PASSWORD: ${POSTGRES_PASSWORD:-airflow}
      PIPELINE_DB_PORT: "5432"
    ports:
      - "8501:8501"
    restart: always

volumes:
  postgres-db-volume:
